<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Wheel - Next Gen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">🎡 SPIN.AI</div>
            <div class="nav-links">
                <a href="#features">Features</a>
                <a href="#how-it-works">How it Works</a>
                <a href="todo-index.html" class="nav-btn">Tasks</a>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-content">
                <h1>The Future of Decision Making</h1>
                <p>Powered by quantum randomization algorithms</p>
                <div class="hero-badge">v2.0 — Production Ready</div>
            </div>
        </section>

        <div class="upload-section">
            <div class="upload-card">
                <div class="upload-icon">📊</div>
                <h2>Upload Your Data</h2>
                <div class="upload-box">
                    <input type="file" id="jsonInput" accept=".json" />
                    <label for="jsonInput" class="upload-label">
                        <span class="upload-text">Drag and drop or click to upload</span>
                        <small>JSON format: ["Item1", "Item2", "Item3"]</small>
                    </label>
                </div>
                <div id="errorMessage" class="error-message"></div>
            </div>
        </div>

        <div id="wheelSection" class="wheel-section" style="display: none;">
            <div class="wheel-container">
                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="500" height="500"></canvas>
                    <div class="glow"></div>
                </div>
                <button id="spinButton" class="spin-button">
                    <span class="button-text">SPIN</span>
                    <span class="button-glow"></span>
                </button>
            </div>

            <div class="result-section">
                <div id="result" class="result">Ready to spin...</div>
                <div class="result-stats">
                    <div class="stat-item">
                        <span class="stat-label">Items</span>
                        <span id="itemCount" class="stat-number">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Spins</span>
                        <span id="spinCount" class="stat-number">0</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>© 2024 SPIN.AI — Built with Next.js, React, and Quantum Magic</p>
            <div class="social-links">
                <a href="#">GitHub</a>
                <a href="#">Twitter</a>
                <a href="#">Discord</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
