<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASKFLOW - Productivity</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">✨ TASKFLOW</div>
            <div class="nav-link">
                <a href="index.html" class="back-btn">← Spin Wheel</a>
            </div>
        </nav>

        <section class="hero">
            <h1>Productivity Maximized</h1>
            <p>Minimal. Powerful. Built to ship.</p>
        </section>

        <div class="todo-wrapper">
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="What needs to be done?"
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">→</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Done</button>
            </div>

            <div class="stats-section">
                <div class="stat-item">
                    <div class="stat-num" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="activeCount">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-item">
                    <div class="stat-num" id="completedCount">0</div>
                    <div class="stat-label">Done</div>
                </div>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <div>📭</div>
                <p>No tasks yet</p>
            </div>

            <div class="action-buttons">
                <button id="clearCompletedBtn" class="btn-clear">Clear Done</button>
                <button id="clearAllBtn" class="btn-reset">Reset</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
