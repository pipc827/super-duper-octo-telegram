<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <header>
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Stay organized and productive</p>
            </header>

            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats-section">
                <div class="stat">
                    <span class="stat-label">Total:</span>
                    <span id="totalCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Active:</span>
                    <span id="activeCount" class="stat-value">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Completed:</span>
                    <span id="completedCount" class="stat-value">0</span>
                </div>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <p>✨ No tasks yet. Add one to get started!</p>
            </div>

            <div class="action-buttons">
                <button id="clearCompletedBtn" class="clear-btn">Clear Completed</button>
                <button id="clearAllBtn" class="clear-all-btn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
