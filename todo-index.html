<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Productivity Suite</title>
    <link rel="stylesheet" href="todo-style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">✨ TASKFLOW</div>
            <div class="nav-links">
                <a href="index.html" class="nav-btn">← Back</a>
            </div>
        </nav>

        <section class="hero">
            <h1>Productivity Reimagined</h1>
            <p>The minimal task manager for maximum efficiency</p>
        </section>

        <div class="todo-wrapper">
            <div class="input-section">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input" 
                    placeholder="What needs to be done? Start typing..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">
                    <span>→</span>
                </button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Done</button>
            </div>

            <div class="stats-section">
                <div class="stat">
                    <span class="stat-number" id="totalCount">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="activeCount">0</span>
                    <span class="stat-label">Active</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="completedCount">0</span>
                    <span class="stat-label">Completed</span>
                </div>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📭</div>
                <p>No tasks yet. Create one to get started.</p>
            </div>

            <div class="action-buttons">
                <button id="clearCompletedBtn" class="clear-btn">Clear Done</button>
                <button id="clearAllBtn" class="clear-all-btn">Nuclear Reset</button>
            </div>
        </div>

        <footer class="footer">
            <p>TaskFlow — Built with precision and purpose</p>
        </footer>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
